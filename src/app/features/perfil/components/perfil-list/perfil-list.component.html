<div class="content-wrapper">
  <mat-card class="list-card">
    <mat-card-header class="header-list">
      <mat-card-title>Gestão de Perfis</mat-card-title>
    </mat-card-header>
    <mat-divider></mat-divider>

    <mat-card-content class="main-content">
      <div class="management-container">
        <div class="top-row">
          <button mat-flat-button color="primary" (click)="irParaCadastro()">
            <mat-icon>add</mat-icon> NOVO PERFIL
          </button>
          <button
            mat-flat-button
            color="warn"
            (click)="deletarSelecionados()"
            [disabled]="!selection.hasValue()"
          >
            <mat-icon>delete</mat-icon> EXCLUIR
            {{
              selection.selected.length > 0
                ? "(" + selection.selected.length + ")"
                : ""
            }}
          </button>
        </div>

        <div class="filter-section">
          <div class="filter-grid">
            <mat-form-field appearance="outline" subscriptSizing="dynamic">
              <mat-label>Nome</mat-label>
              <input
                matInput
                [(ngModel)]="filterValues.name"
                name="name"
                placeholder="Filtrar por nome"
              />
              <mat-icon matPrefix>person</mat-icon>
            </mat-form-field>
            <mat-form-field appearance="outline" subscriptSizing="dynamic">
              <mat-label>Descrição</mat-label>
              <input
                matInput
                [(ngModel)]="filterValues.description"
                name="description"
                placeholder="Filtrar por Descrição"
              />
              <mat-icon matPrefix>description</mat-icon>
            </mat-form-field>
          </div>
          <div class="filter-actions-row">
            <button mat-button (click)="limparFiltros()">
              <mat-icon>restart_alt</mat-icon> Limpar
            </button>
            <button mat-flat-button color="primary" (click)="filtrar()">
              <mat-icon>filter_alt</mat-icon> Filtrar
            </button>
          </div>
        </div>
      </div>

      <div class="table-container mat-elevation-z2">
        <table
          mat-table
          [dataSource]="dataSource"
          matSort
          class="full-width-table"
        >
          <ng-container matColumnDef="select">
            <th mat-header-cell *matHeaderCellDef>
              <mat-checkbox
                color="primary"
                (change)="$event ? masterToggle() : null"
                [checked]="selection.hasValue() && isAllSelected()"
                [indeterminate]="selection.hasValue() && !isAllSelected()"
              >
              </mat-checkbox>
            </th>
            <td mat-cell *matCellDef="let row">
              <mat-checkbox
                color="primary"
                (click)="$event.stopPropagation()"
                (change)="$event ? selection.toggle(row) : null"
                [checked]="selection.isSelected(row)"
              ></mat-checkbox>
            </td>
          </ng-container>
          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
            <td mat-cell *matCellDef="let row" class="font-medium">
              {{ row.name }}
            </td>
          </ng-container>
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Descrição</th>
            <td mat-cell *matCellDef="let row" class="font-medium">
              {{ row.description }}
            </td>
          </ng-container>
          <ng-container matColumnDef="acoes">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let row">
              <button
                mat-icon-button
                color="primary"
                (click)="$event.stopPropagation(); editarPerfil(row)"
                matTooltip="Editar Perfil"
              >
                <mat-icon>edit</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
            (click)="selection.toggle(row)"
            [class.selected-row]="selection.isSelected(row)"
          ></tr>
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="9">
              Nenhum perfil encontrado para os filtros aplicados.
            </td>
          </tr>
        </table>
        <mat-paginator
          [pageSizeOptions]="[5, 10, 25]"
          aria-label="Ver mais perfis"
        ></mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
