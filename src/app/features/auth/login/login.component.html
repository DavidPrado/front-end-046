<div class="login-container">
  <div class="brand-section">
    <div class="logo-wrapper">
      <img src="assets/logo-etec.png" alt="Logo ETEC" class="main-logo" />

      <div class="school-info">
        <p class="unit-name">Prof. Carmelino Corrêa Jr.</p>
        <p class="city">Franca</p>
      </div>
    </div>
  </div>

  <div class="form-section">
    <mat-card class="login-card">
      <mat-card-header>
        <mat-card-title>LOGIN</mat-card-title>
      </mat-card-header>

      @if (errorMessage) {
        <div class="error-message">
          <mat-icon>error</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="input-container">
          <mat-form-field appearance="outline" style="width: 100%">
            <mat-label>Usuário (E-mail)</mat-label>
            <input
              matInput
              formControlName="email"
              placeholder="exemplo@etec.sp.gov.br"
            />
            <mat-icon matPrefix style="margin-right: 8px">person</mat-icon>
          </mat-form-field>
        </div>

        <div class="input-container">
          <mat-form-field appearance="outline" style="width: 100%">
            <mat-label>Senha</mat-label>
            <input
              matInput
              type="password"
              formControlName="password"
              placeholder="Insira sua senha"
            />
            <mat-icon matPrefix style="margin-right: 8px">lock</mat-icon>
          </mat-form-field>
        </div>

        <div class="form-options">
          <a routerLink="/forgot-password" class="forgot-link"
            >Esqueceu a Senha?</a
          >
        </div>

        <button
          mat-flat-button
          class="btn-login"
          type="submit"
          [disabled]="loginForm.invalid"
        >
          Entrar
        </button>
      </form>
    </mat-card>
  </div>
</div>
