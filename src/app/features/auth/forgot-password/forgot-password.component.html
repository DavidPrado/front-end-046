<div class="forgot-container">
  <mat-card class="forgot-card">
    <mat-card-header>
      <mat-card-title>RECUPERAR SENHA</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <p class="instruction-text">
        Informe seu e-mail institucional para receber um link de validação.
      </p>

      @if (errorMessage) {
        <div class="error-banner">
          <mat-icon>report_problem</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>
      }

      @if (successMessage) {
        <div class="success-banner">
          <mat-icon>check_circle</mat-icon>
          <span>{{ successMessage }}</span>
        </div>
      }

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput formControlName="email" placeholder="exemplo@etec.sp.gov.br" type="email">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">
            E-mail inválido
          </mat-error>
        </mat-form-field>

        <button mat-flat-button class="btn-submit" type="submit" [disabled]="forgotForm.invalid || loading">
          <mat-icon *ngIf="!loading">send</mat-icon>
          {{ loading ? 'PROCESSANDO...' : 'ENVIAR LINK DE RECUPERAÇÃO' }}
        </button>

        <div class="back-to-login">
          <a routerLink="/login">Voltar para o Login</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
