<div class="stats-container">
  <div class="header">
    <h3>Resumo Operacional</h3>
    <small>Atualizado a cada 4 horas</small>
  </div>

  <div class="chart-wrapper">
    <canvas baseChart
      [data]="barChartData"
      [options]="barChartOptions"
      [type]="barChartType">
    </canvas>
  </div>
  
  <div class="stats-list" *ngIf="barChartData.labels?.length">
    <div class="stat-item" *ngFor="let label of barChartData.labels; let i = index">
      <span class="label">{{ label }}:</span>
      <span class="value">{{ barChartData.datasets[0].data[i] }}</span>
    </div>
  </div>
</div>
