<div class="form-container">
  <mat-card class="form-card mat-elevation-z2">
    <mat-card-header>
      <mat-card-title>{{
        isEditMode ? "Editar Cargo" : "Novo Cargo"
      }}</mat-card-title>
      <mat-card-subtitle>Informações cadastrais e de contato</mat-card-subtitle>
    </mat-card-header>

    <mat-divider></mat-divider>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-card-content class="form-body">
        <div class="form-grid">
          <mat-form-field
            appearance="outline"
            subscriptSizing="dynamic"
            class="full-width"
          >
            <mat-label>Cargo*</mat-label>
            <input matInput formControlName="position" />
            <mat-icon matPrefix>badge</mat-icon>
          </mat-form-field>

          <mat-form-field
            appearance="outline"
            subscriptSizing="dynamic"
            class="dynamic-field"
          >
            <mat-label>Descrição</mat-label>
            <input matInput formControlName="description" />
            <mat-icon matPrefix>description</mat-icon>
          </mat-form-field>

          <div class="status-toggle-container">
            <label class="toggle-label">Status Cargo</label>
            <div class="toggle-content">
              <mat-slide-toggle color="primary" formControlName="active">
                <span
                  [class.text-active]="form.get('active')?.value"
                  [class.text-inactive]="!form.get('active')?.value"
                >
                  {{
                    form.get("active")?.value
                      ? "CARGO ATIVO"
                      : "CARGO DESATIVADO"
                  }}
                </span>
              </mat-slide-toggle>
              <mat-icon
                [color]="form.get('active')?.value ? 'primary' : 'warn'"
                class="status-icon"
              >
                {{ form.get("active")?.value ? "verified_user" : "block" }}
              </mat-icon>
            </div>
          </div>
        </div>
      </mat-card-content>
      <mat-divider></mat-divider>
      <div class="custom-form-footer">
        <button mat-button type="button" (click)="cancel.emit()">
          CANCELAR
        </button>
        <button
          mat-flat-button
          color="primary"
          type="submit"
          [disabled]="form.invalid"
        >
          <mat-icon>save</mat-icon> {{ isEditMode ? "ATUALIZAR" : "SALVAR" }}
        </button>
      </div>
    </form>
  </mat-card>
</div>
